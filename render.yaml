services:
  - type: web
    name: taptap-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build:backend
    startCommand: npm --workspace Engine/Backend run start
    healthCheckPath: /api/health
    disk:
      name: leaderboard-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: DATABASE_PATH
        value: /var/data/leaderboard.db
      - key: GAMES_ROOT
        value: ../../Games
      - key: CORS_ORIGIN
        sync: false
